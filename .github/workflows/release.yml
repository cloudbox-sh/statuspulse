name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser (GitHub Release + Homebrew tap + Scoop bucket)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDBOX_TAP_TOKEN: ${{ secrets.CLOUDBOX_TAP_TOKEN }}

      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  npm:
    name: npm publish (N+1 packages)
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build platform packages
        run: node npm/scripts/build-platform-packages.js
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish platform packages
        run: |
          set -e
          for pkg in npm/dist/platforms/*; do
            echo "Publishing $pkg"
            npm publish "$pkg" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build meta package
        run: node npm/scripts/build-meta-package.js
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish meta package
        run: npm publish npm/dist/meta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

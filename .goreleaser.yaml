# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: statuspulse

before:
  hooks:
    - go mod tidy

builds:
  - id: statuspulse
    binary: statuspulse
    main: ./
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # charter specifies 5 platform packages: linux/{amd64,arm64},
      # darwin/{amd64,arm64}, windows/amd64. Skip windows/arm64 until
      # a user asks for it.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/cloudbox-sh/statuspulse/cmd.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: cloudbox-sh
    name: statuspulse
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
  header: |
    ## StatusPulse CLI {{ .Version }}

    Install:
    ```sh
    npx statuspulse --help                              # npm / npx
    brew install cloudbox-sh/tap/statuspulse            # Homebrew
    scoop install statuspulse                           # Scoop
    curl -sSL https://get.cloudbox.sh/statuspulse | sh  # curl | sh
    go install github.com/cloudbox-sh/statuspulse@latest
    ```

brews:
  - name: statuspulse
    repository:
      owner: cloudbox-sh
      name: homebrew-tap
      token: "{{ .Env.CLOUDBOX_TAP_TOKEN }}"
    directory: Formula
    homepage: https://statuspulse.cloudbox.sh
    description: StatusPulse CLI — hosted status pages from the terminal
    license: MIT
    commit_author:
      name: Werner Gillmer
      email: werner@gillmer-industries.com
    test: |
      system "#{bin}/statuspulse --version"

scoops:
  - name: statuspulse
    repository:
      owner: cloudbox-sh
      name: scoop-bucket
      token: "{{ .Env.CLOUDBOX_TAP_TOKEN }}"
    homepage: https://statuspulse.cloudbox.sh
    description: StatusPulse CLI — hosted status pages from the terminal
    license: MIT
    commit_author:
      name: Werner Gillmer
      email: werner@gillmer-industries.com
